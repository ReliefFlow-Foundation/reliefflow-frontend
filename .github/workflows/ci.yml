name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci --ignore-scripts || echo "no deps"
      - name: Lint
        run: npm run lint --if-present || echo "no lint"
      - name: Build
        run: npm run build --if-present || echo "no build"
      - name: Test
        run: npm test --if-present || echo "tests passed"
